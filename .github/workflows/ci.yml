name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install project
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"

      - name: Lint
        run: |
          source .venv/bin/activate
          ruff check src/ scripts/ tests/

      - name: Tests
        env:
          PYTHONHASHSEED: "42"
        run: |
          source .venv/bin/activate
          pytest tests/ -v --maxfail=3
